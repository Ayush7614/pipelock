# MCP HTTP listener mode: bridges agent MCP traffic to an upstream MCP server.
# The pod exposes both the standard fetch/forward proxy on 8888 AND an MCP
# HTTP listener on 8889 that forwards to mcp.upstream.
#
# Install (from repo root):
#   helm install pipelock-mcp ./charts/pipelock -f charts/pipelock/examples/values-mcp-sidecar.yaml

mcp:
  enabled: true
  upstream: "http://your-mcp-server.namespace.svc.cluster.local:3000/mcp"
  listen: "0.0.0.0:8889"
  # The listener is reachable through the Service, so it must either
  # authenticate or be isolated. This example relies on the NetworkPolicy
  # below, which admits the MCP port only from pods labelled
  # pipelock.io/agent-egress=true. On a shared cluster prefer a bearer token:
  # mount a Secret via extraVolumes/extraVolumeMounts and set
  # mcp.authTokenFile to its path instead of acknowledging below.
  allowUnauthenticated: true

# Required by mcp.allowUnauthenticated: restricts the MCP listener to agent pods.
networkPolicy:
  enabled: true
  preset: dev

pipelock:
  mode: balanced
  enforce: true
  mcp_input_scanning:
    enabled: true
    action: block
  mcp_tool_scanning:
    enabled: true
    detect_drift: true
  # Tool policy requires at least one rule when enabled. Replace with the
  # rules that match your tool surface.
  mcp_tool_policy:
    enabled: true
    action: block
    rules:
      - name: "Block shell execution"
        tool_pattern: "bash|shell|exec"
  # Redaction requires a default profile naming the secret classes to
  # placeholder-substitute. Extend the class list for your environment.
  redaction:
    enabled: true
    default_profile: code
    profiles:
      code:
        classes:
          - aws-access-key
          - google-api-key
          - github-token
