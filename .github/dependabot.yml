version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - ci
    groups:
      ci-actions:
        patterns:
          - "*"

  # Pip ecosystem: the cross-implementation Python verifier fixture.
  # Lockfile is requirements.txt (==-pinned with hashes); requirements.in
  # is the source manifest. Dependabot bumps the lock when a new advisory
  # lands or a fresh patch ships, so the verifier deps stay current
  # without us tracking PyPI by hand.
  - package-ecosystem: pip
    directory: /testdata/python_verifier_fixture
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 3
    groups:
      verifier-fixture:
        patterns:
          - "*"

  # Pip ecosystem: the pr-review.yaml workflow's pinned deps. Same
  # ==-pin-with-hash lockfile pattern.
  - package-ecosystem: pip
    directory: /.github
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 3
    groups:
      pr-review-deps:
        patterns:
          - "*"
